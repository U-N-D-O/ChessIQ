name: Build Stockfish for iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load release guard values
        run: python3 tool/release_guard.py --emit-github-env >> "$GITHUB_ENV"

      - name: Verify release guard
        run: python3 tool/release_guard.py

      - name: Fetch pinned Stockfish 18 source
        run: |
          set -euo pipefail
          git init Stockfish
          git -C Stockfish remote add origin "$STOCKFISH_REPO"
          git -C Stockfish fetch --depth 1 origin "$STOCKFISH_TAG"
          git -C Stockfish checkout --detach "$STOCKFISH_COMMIT"
          test "$(git -C Stockfish rev-parse HEAD)" = "$STOCKFISH_COMMIT"

      - name: Build for iOS device (arm64)
        working-directory: Stockfish/src
        run: |
          # Write a wrapper that strips macOS-specific flags before forwarding to iOS clang
          {
            echo '#!/bin/bash'
            echo 'args=()'
            echo 'for arg in "$@"; do'
            echo '  case "$arg" in'
            echo '    -mmacosx-version-min=*) ;;'
            echo '    -m64) ;;'
            echo '    *) args+=("$arg") ;;'
            echo '  esac'
            echo 'done'
            echo 'exec xcrun --sdk iphoneos clang++ "${args[@]}" -miphoneos-version-min=14.0'
          } > /tmp/ios-device-cxx.sh
          chmod +x /tmp/ios-device-cxx.sh
          make -j"$(sysctl -n hw.logicalcpu)" \
            ARCH=apple-silicon \
            CXX=/tmp/ios-device-cxx.sh \
            build
          strip stockfish
          mv stockfish ../../stockfish-ios-device

      - name: Clean before simulator build
        working-directory: Stockfish/src
        run: make clean

      - name: Build for iOS simulator (Apple Silicon)
        working-directory: Stockfish/src
        run: |
          {
            echo '#!/bin/bash'
            echo 'args=()'
            echo 'for arg in "$@"; do'
            echo '  case "$arg" in'
            echo '    -mmacosx-version-min=*) ;;'
            echo '    -m64) ;;'
            echo '    *) args+=("$arg") ;;'
            echo '  esac'
            echo 'done'
            echo 'exec xcrun --sdk iphonesimulator clang++ "${args[@]}" -miphonesimulator-version-min=14.0'
          } > /tmp/ios-sim-cxx.sh
          chmod +x /tmp/ios-sim-cxx.sh
          make -j"$(sysctl -n hw.logicalcpu)" \
            ARCH=apple-silicon \
            CXX=/tmp/ios-sim-cxx.sh \
            build
          strip stockfish
          mv stockfish ../../stockfish-ios-simulator

      - name: Upload device binary
        uses: actions/upload-artifact@v4
        with:
          name: stockfish-ios-device
          path: stockfish-ios-device
          retention-days: 90

      - name: Upload simulator binary
        uses: actions/upload-artifact@v4
        with:
          name: stockfish-ios-simulator
          path: stockfish-ios-simulator
          retention-days: 90
