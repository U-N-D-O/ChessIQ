name: Release Guard

'on':
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional git tag that must match HEAD for a release candidate.
        required: false
        type: string

jobs:
  verify-release-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release guard
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_TAG:-}" ]; then
            python3 tool/release_guard.py --expected-tag "$RELEASE_TAG"
          else
            python3 tool/release_guard.py
          fi