name: Build iOS IPA (No Sign)

on:
  workflow_dispatch:

jobs:
  build-ios-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug current repo and Podfile
        run: |
          set -euo pipefail
          echo "Current commit:"
          git rev-parse HEAD
          git log -1 --oneline
          echo "Podfile head lines:"
          sed -n '1,20p' ios/Podfile

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Verify flutter and environment (debug)
        shell: bash
        run: |
          echo "which flutter: $(which flutter || true)"
          command -v flutter || true
          flutter --version || true
          export FLUTTER_ROOT="$(dirname "$(dirname "$(command -v flutter)")")"
          echo "FLUTTER_ROOT=$FLUTTER_ROOT"
          ls -la "$FLUTTER_ROOT/packages/flutter_tools/bin" || true
          ls -la "$FLUTTER_ROOT/bin/cache/artifacts/engine/ios" || true
          ls -la .

      - name: Get Flutter packages and pre-cache iOS engine
        shell: bash
        run: |
          export FLUTTER_ROOT="$(dirname "$(dirname "$(command -v flutter)")")"
          flutter pub get
          flutter precache --ios

      - name: Install Ruby gems (Bundler) for iOS (if you use a Gemfile)
        working-directory: ios
        shell: bash
        run: |
          if [ -f Gemfile ]; then
            gem install bundler || true
            bundle install --jobs 4 --retry 3
          else
            echo "No Gemfile in ios/, skipping bundle install"
          fi

      - name: Install CocoaPods
        working-directory: ios
        shell: bash
        run: |
          if [ -f Gemfile ]; then
            bundle exec pod install --verbose
          else
            pod install --verbose
          fi

      - name: Resolve Xcode Swift package dependencies
        run: xcodebuild -workspace ios/Runner.xcworkspace -scheme Runner -sdk iphoneos -configuration Release -resolvePackageDependencies

      - name: Clone Stockfish 18
        run: git clone --depth 1 --branch sf_18 https://github.com/official-stockfish/Stockfish.git

      - name: Build Stockfish objects (iOS device arm64)
        working-directory: Stockfish/src
        run: |
          set -euo pipefail

          {
            echo '#!/bin/bash'
            echo 'args=()'
            echo 'for arg in "$@"; do'
            echo '  case "$arg" in'
            echo '    -mmacosx-version-min=*) ;;'
            echo '    -m64) ;;'
            echo '    -flto|-flto=*) ;;'
            echo '    *) args+=("$arg") ;;'
            echo '  esac'
            echo 'done'
            echo 'exec xcrun --sdk iphoneos clang++ "${args[@]}" -miphoneos-version-min=14.0'
          } > /tmp/ios-device-cxx.sh
          chmod +x /tmp/ios-device-cxx.sh

          make -j"$(sysctl -n hw.logicalcpu)" \
            ARCH=apple-silicon \
            CXX=/tmp/ios-device-cxx.sh \
            build

      - name: Build libstockfish_ios.a
        run: |
          set -euo pipefail
          cd Stockfish/src

          # Deterministic symbol rename path: compile a renamed copy of main.cpp
          # and force C linkage so the symbol is exactly _stockfish_main.
          perl -0777 -pe 's/\bint\s+main\s*\(/extern "C" int stockfish_main(/' main.cpp > main_stockfish.cpp
          /tmp/ios-device-cxx.sh \
            -arch arm64 \
            -Wall -Wcast-qual -fno-exceptions -std=c++17 -pedantic -Wextra -Wshadow -Wmissing-declarations \
            -DUSE_PTHREADS -DNDEBUG -O3 -funroll-loops -DIS_64BIT -DUSE_POPCNT \
            -DUSE_NEON=8 -march=armv8.2-a+dotprod -DUSE_NEON_DOTPROD -DARCH=apple-silicon \
            -c -o main_stockfish.o main_stockfish.cpp

          # Sanity check: ensure renamed symbol is present.
          xcrun --sdk iphoneos nm -gU main_stockfish.o | tee /tmp/main_stockfish_symbols.txt
          grep -E "_stockfish_main$" /tmp/main_stockfish_symbols.txt >/dev/null

          shopt -s nullglob
          objs=()
          for obj in *.o; do
            if [[ "$obj" != "main.o" && "$obj" != "main_stockfish.o" ]]; then
              objs+=("$obj")
            fi
          done
          for obj in syzygy/*.o; do
            objs+=("$obj")
          done

          /usr/bin/libtool -static \
            -o ../../ios/Runner/libstockfish_ios.a \
            main_stockfish.o "${objs[@]}"

      - name: Configure iOS link flags for Stockfish
        run: |
          set -euo pipefail
          cat >> ios/Flutter/Release.xcconfig <<'EOF'
          LIBRARY_SEARCH_PATHS=$(inherited) $(PROJECT_DIR)/Runner
          OTHER_LDFLAGS=$(inherited) -lstockfish_ios -lc++
          EOF

      - name: Build Flutter iOS app (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          set -euo pipefail
          APP_PATH="build/ios/iphoneos/Runner.app"
          IPA_DIR="build/ios/ipa"

          test -d "$APP_PATH"

          rm -rf "$IPA_DIR"
          mkdir -p "$IPA_DIR/Payload"
          cp -R "$APP_PATH" "$IPA_DIR/Payload/"

          cd "$IPA_DIR"
          /usr/bin/zip -qry ChessIQ.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChessIQ-ipa-no-sign
          path: build/ios/ipa/ChessIQ.ipa
          retention-days: 90

